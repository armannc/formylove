<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Навсегда со мной?</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI', sans-serif;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    overflow:hidden;
}

/* ===== СЛАЙДШОУ ФОН ===== */
.slideshow{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
    overflow:hidden;
}

.slide{
    position:absolute;
    width:100%;
    height:100%;
    background-size:cover;
    background-position:center;
    animation:slideAnimation 5s linear forwards;
    opacity:0;
}

@keyframes slideAnimation{
    0%{transform:translateX(100%); opacity:1;}
    50%{transform:translateX(0); opacity:1;}
    100%{transform:translateX(-100%); opacity:0;}
}

/* ===== ОСНОВНОЙ КОНТЕНТ ===== */
.container{
    text-align:center;
    max-width:400px;
    animation:fadeIn 1s ease;
}

h1{
    font-size:28px;
    color:white;
    margin-bottom:30px;
    text-shadow:0 4px 15px rgba(0,0,0,0.3);
}

.buttons{
    display:flex;
    gap:20px;
    justify-content:center;
}

button{
    border:none;
    padding:15px 30px;
    font-size:18px;
    border-radius:30px;
    cursor:pointer;
    transition:0.3s ease;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

#yesBtn{
    background:#ff4d6d;
    color:white;
}

#noBtn{
    background:white;
    color:#ff4d6d;
}

button:hover{
    transform:scale(1.1);
}

.success{
    display:none;
    text-align:center;
    animation:fadeIn 1s ease;
}

.success h2{
    font-size:30px;
    color:white;
    animation:bounce 1.5s infinite;
}

@keyframes fadeIn{
    from{opacity:0; transform:scale(0.8);}
    to{opacity:1; transform:scale(1);}
}

@keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}
</style>
</head>

<body>

<div class="slideshow" id="slideshow"></div>

<div class="container" id="main">
    <h1>Ты будешь со мной навсегда?❤️</h1>
    <div class="buttons">
        <button id="yesBtn">Конечно</button>
        <button id="noBtn">Нет</button>
    </div>
</div>


<div class="success" id="success">
    <h2>Теперь ты моя навсегда 💞<br>Я люблююю тебяяяяяяяяяяяяяяяяяяяяяяяяяяя ❤️</h2>
</div>

<script>
let noCount=0;
let yesSize=18;

const noBtn=document.getElementById("noBtn");
const yesBtn=document.getElementById("yesBtn");
const main=document.getElementById("main");
const success=document.getElementById("success");
const slideshow=document.getElementById("slideshow");

const noTexts=[
"Ты уверена?",
"Точно?",
"Точно точно?",
"Точно точно точно?",
"Может все таки подумаешь?",
"Ты правда не хочешь?",
"Ладно... но я всё равно люблю ❤️"
];

noBtn.addEventListener("click",()=>{
    noCount++;
    noBtn.textContent=noTexts[Math.min(noCount,noTexts.length-1)];

    yesSize+=10;
    yesBtn.style.fontSize=yesSize+"px";
    yesBtn.style.padding=(yesSize/1.5)+"px "+(yesSize*1.2)+"px";
});

yesBtn.addEventListener("click",()=>{
    main.style.display="none";
    success.style.display="block";
    startSlideshow();
});

function startSlideshow(){

    const images=[
        "images/photo7.jpeg",
        "images/photo8.jpeg",
        "images/photo9.jpeg",
        "images/photo10.jpeg",
        "images/photo1.jpeg",
        "images/photo2.jpeg",
        "images/photo3.jpeg",
        "images/photo4.jpeg",
        "images/photo5.jpeg",
        "images/photo6.jpeg",
    ];

    let index=0;

    setInterval(()=>{
        const slide=document.createElement("div");
        slide.className="slide";
        slide.style.backgroundImage=`url(${images[index]})`;
        slideshow.appendChild(slide);

        setTimeout(()=>{
            slide.remove();
        },5000);

        index=(index+1)%images.length;

    },2500);
}
</script>

</body>
</html>
